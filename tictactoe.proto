syntax = "proto3";

package tictactoe;

// Defines the import path for the generated Go code
option go_package = "tic-tac-toe/api";

// OpCodes act as the routing mechanism for our WebSocket messages.
// Nakama expects an integer OpCode with every custom message.
enum OpCode {
    OPCODE_UNSPECIFIED = 0;
    OPCODE_MOVE = 1;          // Client -> Server: "I want to place my mark"
    OPCODE_STATE = 2;         // Server -> Client: "Here is the updated game state"
    OPCODE_GAME_OVER = 3;     // Server -> Client: "The match has ended"
}

// The authoritative Game State broadcasted by the server tick loop
message GameState {
    // A 9-element array representing the 3x3 board.
    // 0 = Empty, 1 = Player X, 2 = Player O
    repeated int32 board = 1;     
    
    // Indicates whose turn it is currently (1 or 2)
    int32 current_turn = 2;       
    
    // Unix timestamp indicating when the current turn started.
    // Used by the server to enforce the 30-second forfeit rule.
    int64 turn_start_time = 3;    
    
    // The Nakama User ID of the winner, or empty if ongoing/draw.
    string winner_id = 4;    
    
    string p1_id = 5; // NEW: Player 1 (X)
    string p2_id = 6; // NEW: Player 2 (O)


    bool is_timed_mode = 7;
    int64 p1_time_used = 8;
    int64 p2_time_used = 9;

    int64 p1_disconnect_time = 10; // Unix timestamp when P1 dropped (0 if connected)
    int64 p2_disconnect_time = 11; // Unix timestamp when P2 dropped (0 if connected)
}

// The payload sent by the client when making a move
message MoveRequest {
    // An integer from 0 to 8 representing the requested grid cell
    int32 position = 1;           
}