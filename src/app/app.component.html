<div class="app-container">
  <header class="app-header">
    
    <button *ngIf="nakamaService.hasSession() && !isGamePage()" 
            class="logout-backdoor" 
            [class.is-back]="!isHomePage()"
            (click)="handleHeaderAction()" 
            [title]="isHomePage() ? 'Logout' : 'Go Back'">
      
      <svg *ngIf="isHomePage()" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      

      <ng-container *ngIf="!isHomePage()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span class="back-text">Back</span>
      </ng-container>
    </button>

    <h1>LILA Tic-tac-toe</h1>
    
    <div class="trophy-pill" *ngIf="nakamaService.hasSession()">
        🏆 {{ nakamaService.myTrophies() }}
    </div>
  </header>
  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
  <div class="modal-overlay" *ngIf="nakamaService.sessionKicked()">
  <div class="modal-card" style="border: 2px solid #ff5e5e;">
    <div style="font-size: 3rem; margin-bottom: 16px;">📱</div>
    
    <h2 style="color: #ff5e5e; margin-top: 0;">Session Disconnected</h2>
    
    <p style="color: #a0a0a0; margin-bottom: 32px; font-size: 1.1rem;">
      You have been safely logged out because your account was accessed from another device.
    </p>
    
    <button class="btn-primary" style="width: 100%;" (click)="acknowledgeSessionKick()">
      Return to Login
    </button>
  </div>
</div>
</div>

<!-- Logout Confirmation Modal -->
<div class="modal-overlay" *ngIf="isLogoutModalOpen()">
  <div class="modal-card">
    <h2>Logout</h2>
    <p>Are you sure you want to logout?</p>
    <div class="modal-actions">
      <button class="btn-cancel" (click)="cancelLogout()">Cancel</button>
      <button class="btn-primary" (click)="confirmLogout()">Logout</button>
    </div>
  </div>
</div>

<div class="modal-overlay" *ngIf="nakamaService.isReconnecting() && !nakamaService.sessionKicked()">
  <div class="modal-card" style="border: 2px solid #fbbf24;">
    
    <div style="font-size: 3.5rem; margin-bottom: 8px;">🔌</div>
    <div class="spinner" style="margin: 0 auto 24px auto; width: 30px; height: 30px; border-width: 3px;"></div>
    
    <h2 style="color: #fbbf24; margin-top: 0;">Connection Lost</h2>
    
    <p style="color: #a0a0a0; margin-bottom: 0; font-size: 1.1rem;">
      Trying to reconnect to the server...
    </p>
    
  </div>
</div>
