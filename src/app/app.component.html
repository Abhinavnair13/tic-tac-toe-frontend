<div class="app-container">
  <header class="app-header">
    <button *ngIf="nakamaService.hasSession()" class="logout-backdoor" (click)="promptLogout()" title="Logout">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </button>
    <h1>LILA Tic-tac-toe</h1>
    <div class="trophy-pill" *ngIf="nakamaService.hasSession()">
        🏆 {{ nakamaService.myTrophies() }}
      </div>
  </header>
  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Logout Confirmation Modal -->
<div class="modal-overlay" *ngIf="isLogoutModalOpen()">
  <div class="modal-card">
    <h2>Logout</h2>
    <p>Are you sure you want to logout?</p>
    <div class="modal-actions">
      <button class="btn-cancel" (click)="cancelLogout()">Cancel</button>
      <button class="btn-primary" (click)="confirmLogout()">Logout</button>
    </div>
  </div>
</div>
