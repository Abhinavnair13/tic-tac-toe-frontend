<div class="home-wrapper">
  <div class="profile-header">
    <div class="avatar">
      {{ username().charAt(0).toUpperCase() }}
    </div>
    <h2>Welcome, {{ username() }}!</h2>
  </div>

  <div class="nav-buttons">
    <button class="nav-btn play-btn" (click)="playNow()">
      Play Now
    </button>
    <button class="nav-btn" (click)="goToLeaderboard()">
      Leaderboards
    </button>
    <button class="nav-btn profile-btn" (click)="goToProfile()">
      Profile
    </button>
  </div>

  <div class="online-indicator">
    <div class="neon-dot"></div>Players Online : {{ nakamaService.onlinePlayers() }} 
  </div>
</div>
